<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenant Self-Service Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div class="max-w-md mx-auto my-10 bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">Tenant Portal</h1>

        <section class="mb-10">
            <h2 class="text-lg font-semibold mb-3 text-blue-600">Check Your Monthly Bill</h2>
            <div class="flex gap-2">
                <input type="text" id="houseSearch" placeholder="Enter House ID (e.g. NV01)" 
                       class="flex-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                <button onclick="fetchBill()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Search</button>
            </div>
            
            <div id="billResult" class="mt-4 p-4 bg-blue-50 rounded-lg hidden">
                <p class="text-sm text-gray-600">Name: <span id="resName" class="font-bold text-gray-800"></span></p>
                <p class="text-sm text-gray-600">Total Due: <span id="resTotal" class="text-xl font-bold text-red-600"></span></p>
                <p class="text-sm text-gray-600">Status: <span id="resStatus" class="font-bold"></span></p>
                <p id="resGapNote" class="text-xs italic text-gray-500 mt-2"></p>
            </div>
        </section>

        <hr class="mb-10">

        <section>
            <h2 class="text-lg font-semibold mb-3 text-orange-600">Report an Issue (Complaints)</h2>
            <div class="space-y-3">
                <input type="text" id="compHouse" placeholder="House ID" class="w-full p-2 border rounded-lg">
                <input type="text" id="compName" placeholder="Your Full Name" class="w-full p-2 border rounded-lg">
                <textarea id="compDesc" placeholder="Describe the issue (e.g. Leaking sink in kitchen)" 
                          class="w-full p-2 border rounded-lg h-24"></textarea>
                <button onclick="sendComplaint()" id="compBtn" class="w-full bg-orange-500 text-white py-2 rounded-lg font-bold hover:bg-orange-600">
                    Submit Complaint
                </button>
            </div>
        </section>

        <p class="text-center text-xs text-gray-400 mt-8">© 2026 Management System | Thika, Kenya</p>
    </div>

    <script type="module" src="config.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
