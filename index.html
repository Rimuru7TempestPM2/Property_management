<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenant Portal | Thika</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto space-y-4">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm">
            <h2 class="text-xl font-bold mb-4 text-gray-700">Find Your Bill</h2>
            <div class="flex gap-2">
                <input type="text" id="houseSearch" placeholder="House ID (e.g. NV01)" class="flex-1 p-3 bg-gray-50 rounded-xl outline-none border focus:border-blue-500">
                <button onclick="fetchBill()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700">Search</button>
            </div>
            <div id="billResult" class="mt-4 p-4 bg-blue-50 rounded-xl hidden">
                <p class="text-gray-600 text-sm">Status for <span id="resID" class="font-bold text-gray-900"></span></p>
                <p class="text-2xl font-black text-blue-800 my-1" id="resTotal"></p>
                <div id="resStatus" class="inline-block px-3 py-1 rounded-full text-xs font-bold uppercase"></div>
            </div>
        </div>

        <div class="bg-green-600 p-6 rounded-2xl text-white shadow-lg">
            <h3 class="font-bold text-lg">How to Pay</h3>
            <p class="text-green-100 text-xs mb-4 italic">Verification takes up to 24 hours.</p>
            
            <div class="bg-green-700/40 p-4 rounded-xl mb-4 text-sm font-mono border border-green-500/30">
                <p>1. Send Money M-Pesa</p>
                <p>2. Number: <span class="font-bold underline">07XX XXX XXX</span></p>
                <p>Owner: Property Manager</p>
            </div>
            
            <div class="space-y-3">
                <input type="text" id="payName" placeholder="Full Name" class="w-full p-3 rounded-xl text-gray-900 outline-none">
                <input type="text" id="payPhone" placeholder="Phone (e.g. 07...)" class="w-full p-3 rounded-xl text-gray-900 outline-none">
                <input type="number" id="payAmount" placeholder="Amount Paid" class="w-full p-3 rounded-xl text-gray-900 outline-none">
                <input type="text" id="payCode" placeholder="M-PESA CODE" class="w-full p-3 rounded-xl text-gray-900 outline-none uppercase font-bold">
                <button onclick="submitPayment()" class="w-full bg-white text-green-700 font-black py-4 rounded-xl shadow-md uppercase">Verify Payment</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border">
            <h2 class="text-lg font-bold text-gray-700 mb-4">Lodge a Complaint</h2>
            <div class="space-y-3">
                <input type="text" id="compName" placeholder="Your Name" class="w-full p-3 bg-gray-50 rounded-xl outline-none border">
                <textarea id="compDesc" placeholder="Leaking ceiling, water tap issue, etc..." class="w-full p-3 bg-gray-50 rounded-xl h-24 outline-none border"></textarea>
                <button onclick="submitComplaint()" class="w-full bg-gray-800 text-white py-3 rounded-xl font-bold hover:bg-black">Submit Issue</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
